# Nginx reverse proxy for terradev-mcp SSE endpoint
# Add this as an upstream + location block on your existing terradev.cloud server

upstream terradev_mcp {
    server 127.0.0.1:8080;
}

server {
    listen 443 ssl;
    server_name terradev-mcp.terradev.cloud;

    # Use existing terradev.cloud SSL certs
    ssl_certificate     /etc/letsencrypt/live/terradev.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/terradev.cloud/privkey.pem;

    # SSE requires these settings
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;

    # Pass auth headers through to the app
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long timeout for SSE connections
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    location / {
        proxy_pass http://terradev_mcp;
    }
}
